<!DOCTYPE html>
<html>
<head>
    <title>wixii nagu saabsan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold">🍕 Sayid's Restaurant</a>
        <a href="/" class="btn btn-light">Home</a>
    </div>
</nav>


<!-- MAIN CONTENT -->
<div class="container mt-5">
    
    <h1 class="fw-bold text-danger">About Us</h1>
    <p class="fs-5">We serve the best food in Mogadishu!</p>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <!-- name -->
        <div class="mb-3">
            <label>magacaaga gali</label>
            <input type="name" 
                   class="form-control" 
                   name="name" 
                   placeholder="Enter your name">
        </div>


        <!-- xaafadda -->
          <div class="mb-4">
            <label>xaafadda</label>
            <input type="text"
                  class="form-control"
                   name="name"
                   placeholder="gali xaafadiina">
          </div>



        <!-- email -->
        <div class="mb-3">
            <label>Your Email</label>
            <input type="email" 
                   class="form-control" 
                   name="email" 
                   placeholder="Enter your email">
        </div>

        <!-- button -->
        <button type="submit" class="btn btn-danger">
            Submit
        </button>

    </form>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 Sayid's Restaurant — Mogadishu</p>
</footer>

</body>
</html>
