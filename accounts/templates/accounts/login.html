<!DOCTYPE html>
<html>
<head>
    <title>Login — Sayid's Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold">🍕 Sayid's Restaurant</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4" style="max-width: 400px; margin: auto;">
        
        <h2 class="text-center fw-bold text-danger mb-4">Login</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" name="username" placeholder="Enter username">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-danger w-100">
                Login
            </button>
        </form>

        <p class="text-center mt-3">
            No account? 
            <a href="/register/" class="text-danger">Register here</a>
        </p>

    </div>
</div>

</body>
</html>
