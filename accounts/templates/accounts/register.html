{% extends 'base.html' %}

{% block title %}Register — Sayid's Restaurant{% endblock %}

{% block content %}

<div class="card p-4" style="max-width: 400px; margin: auto;">
    
    <h2 class="text-center fw-bold text-danger mb-4">Register</h2>

    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" name="username" placeholder="Enter username">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" name="password" placeholder="Enter password">
        </div>

        <button type="submit" class="btn btn-danger w-100">
            Register
        </button>
    </form>

    <p class="text-center mt-3">
        Already have account? 
        <a href="/login/" class="text-danger">Login here</a>
    </p>

</div>

{% endblock %}
