<!DOCTYPE html>
<html>
<head>
    <title>Receipt — Sayid's Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold">🍕 Sayid's Restaurant</a>
        <a href="/" class="btn btn-light">Home</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4" style="max-width: 500px; margin: auto;">
        
        <h2 class="text-center fw-bold text-danger">🧾 Receipt</h2>
        <hr>
        
        <p><strong>Customer:</strong> {{ order.customer_name }}</p>
        <p><strong>Item:</strong> {{ order.item }}</p>
        <p><strong>Quantity:</strong> {{ order.quantity }}</p>
        <p><strong>Date:</strong> {{ order.date }}</p>
        
        <hr>
        <h4 class="text-center text-danger">Thank you! Come again! 🙏</h4>
        <hr>

        <div class="text-center mt-3">
            <a href="/order/" class="btn btn-danger me-2">New Order</a>
            <a href="/orders/" class="btn btn-dark">All Orders</a>
        </div>

    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 Sayid's Restaurant</p>
</footer>

</body>
</html>
