<!DOCTYPE html>
<html>
<head>
    <title>Order — Sayid's Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3">🍕 Sayid's Restaurant</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Place Your Order</h2>

    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" name="customer_name" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Select Item</label>
            <select class="form-select" name="item">
                <option>🍔 Burger - $5</option>
                <option>🍕 Pizza - $8</option>
                <option>🍝 Pasta - $6</option>
                <option>🥤 Juice - $2</option>
            </select>
        </div>

        <button type="submit" class="btn btn-danger">
            Place Order
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
