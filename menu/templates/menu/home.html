<!DOCTYPE html>
<html>
<head>
    <title>Order — Sayid's Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
    <div class="container">
        <a class="navbar-brand fw-bold">🍕 Sayid's Restaurant</a>
        <a href="/" class="btn btn-light">Home</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Place Your Order</h2>

    <form method="POST" action="/order/">
        {% csrf_token %}
        
        <div class="mb-3">
            <label>Your Name</label>
            <input type="text" class="form-control" name="customer_name" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label>Select Item</label>
            <select class="form-select" name="item">
                <option>🍔 Burger - $5</option>
                <option>🍕 Pizza - $8</option>
                <option>🍝 Pasta - $6</option>
                <option>🥤 Juice - $2</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" class="form-control" name="quantity" value="1" min="1">
        </div>

        <button type="submit" class="btn btn-danger">
            Place Order 🛒
        </button>
    </form>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 Sayid's Restaurant</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<div class="container mt-3">
    <a href="/order/" class="btn btn-danger btn-lg me-2">
        Place Order 🛒
    </a>
    <a href="/orders/" class="btn btn-dark btn-lg">
        View All Orders 📋
    </a>
</div>
