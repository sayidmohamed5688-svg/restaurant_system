{% extends 'base.html' %}

{% block title %}Home — Sayid's Restaurant{% endblock %}

{% block content %}

<h2 class="mb-4">Welcome to Sayid's Restaurant! 🍕</h2>
<p class="fs-5">Best food in Mogadishu!</p>

<h3 class="mt-4 mb-3">Our Menu</h3>

{% for item in menu_items %}
<div class="card mb-3">
    <div class="card-body d-flex justify-content-between">
        <span>{{ item.name }}</span>
        <span class="text-danger fw-bold">${{ item.price }}</span>
    </div>
</div>
{% endfor %}

<div class="mt-4">
    <a href="/order/" class="btn btn-danger btn-lg me-2">Place Order 🛒</a>
    <a href="/orders/" class="btn btn-dark btn-lg me-2">All Orders 📋</a>
    <a href="/search/" class="btn btn-warning btn-lg">Search 🔍</a>
</div>

{% endblock %}
